name: Validate Plugin

on:
  push:
    branches: [main]
    paths:
      - '.claude/**'
      - 'plugin-extras/**'
      - 'build-plugin.sh'
      - 'plugin/.claude-plugin/**'
  pull_request:
    branches: [main]
    paths:
      - '.claude/**'
      - 'plugin-extras/**'
      - 'build-plugin.sh'
      - 'plugin/.claude-plugin/**'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate plugin.json
        run: |
          echo "Checking plugin.json syntax..."
          python3 -c "
          import json, sys
          with open('plugin/.claude-plugin/plugin.json') as f:
              data = json.load(f)
          required = ['name', 'version', 'description']
          missing = [k for k in required if k not in data]
          if missing:
              print(f'Missing required fields: {missing}')
              sys.exit(1)
          print(f'Valid: {data[\"name\"]} v{data[\"version\"]}')
          "

      - name: Validate marketplace.json
        run: |
          echo "Checking marketplace.json syntax..."
          python3 -c "
          import json
          with open('plugin/.claude-plugin/marketplace.json') as f:
              data = json.load(f)
          assert 'name' in data, 'Missing top-level name field'
          assert 'owner' in data, 'Missing top-level owner field'
          assert 'name' in data['owner'], 'Owner missing name'
          assert 'email' in data['owner'], 'Owner missing email'
          assert 'plugins' in data, 'Missing plugins array'
          for p in data['plugins']:
              assert 'name' in p, 'Plugin entry missing name'
          print(f'Valid: {data[\"name\"]} with {len(data[\"plugins\"])} plugin(s)')
          "

      - name: Build plugin
        run: bash build-plugin.sh

      - name: Check for stale paths
        run: |
          echo "Checking for unrewritten .claude/ paths in plugin output..."
          STALE=$(grep -r '\.claude/' plugin/ \
            --include="*.md" --include="*.yaml" --include="*.yml" \
            | grep -v 'CLAUDE_PLUGIN_ROOT' \
            | grep -v '\.claude/sdd/features' \
            | grep -v '\.claude/sdd/reports' \
            | grep -v '\.claude/sdd/archive' \
            | grep -v '\.claude/sdd/' \
            | grep -v '\.claude/storage' \
            | grep -v '\.claude-plugin' \
            | grep -v '\.claude/settings' \
            | grep -v 'CLAUDE\.md' \
            | grep -v '\.claude/plans' \
            | grep -v '\.claude/memory' \
            | grep -v '^[[:space:]]*#' \
            || true)

          if [ -n "$STALE" ]; then
            echo "::error::Found unrewritten .claude/ references in plugin output:"
            echo "$STALE" | head -20
            exit 1
          fi

      - name: Verify agent count
        run: |
          COUNT=$(find plugin/agents -name "*.md" ! -name "README.md" ! -name "_template.md" | wc -l)
          echo "Agents found: $COUNT"
          if [ "$COUNT" -lt 50 ]; then
            echo "::error::Expected 50+ agents, found $COUNT"
            exit 1
          fi

      - name: Verify skill count
        run: |
          COUNT=$(find plugin/skills -name "SKILL.md" | wc -l)
          echo "Skills found: $COUNT"
          if [ "$COUNT" -lt 4 ]; then
            echo "::error::Expected 4+ skills, found $COUNT"
            exit 1
          fi

      - name: Verify KB domain count
        run: |
          COUNT=$(find plugin/kb -maxdepth 1 -type d ! -name "kb" ! -name "_templates" ! -name "shared" | wc -l)
          echo "KB domains found: $COUNT"
          if [ "$COUNT" -lt 20 ]; then
            echo "::error::Expected 20+ KB domains, found $COUNT"
            exit 1
          fi

      - name: Verify hooks and scripts
        run: |
          echo "Checking hooks..."
          python3 -c "import json; json.load(open('plugin/hooks/hooks.json'))"
          echo "Checking init script..."
          test -x plugin/scripts/init-workspace.sh || { echo "::error::init-workspace.sh not executable"; exit 1; }
          echo "All checks passed"
